name: Robot Amazon BestSellers & Auto-Correction IA

on:
  schedule:
    - cron: '0 7 * * *' # Tourne tous les matins à 7h
  workflow_dispatch: # Te permet de le lancer à la main

permissions:
  contents: write
  issues: write
  
jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: Configurer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer Google Chrome et les dépendances système
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3
        
    - name: Installer les bibliothèques Python
      run: |
        pip install pandas openpyxl beautifulsoup4 selenium webdriver-manager

    - name: Étape 1 - Extraction du Classement (robot.py)
      run: python robot.py

    - name: Étape 2 - Enrichissement des Fiches Produits (details_produits.py)
      run: python details_produits.py

    - name: Étape 3 - Audit de lisibilité des données (correcteur_ia.py)
      run: python correcteur_ia.py

    - name: Étape 4 - Enregistrement des données dans GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add historique_bestsellers.xlsx
        git commit -m "Mise à jour des données et du nettoyage [Automatique]" || echo "Aucun changement dans l'Excel"
        git push

    - name: Étape 5 - Déclenchement de l'Auto-Correction (Si anomalie)
      id: check_file
      run: |
        if [ -f alerte_ia.txt ]; then
          echo "ANOMALIE_DETECTEE=true" >> $GITHUB_ENV
        else
          echo "ANOMALIE_DETECTEE=false" >> $GITHUB_ENV
        fi

    - name: Étape 6 - Ouverture du ticket de réparation pour l'IA
      if: env.ANOMALIE_DETECTEE == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const contenuAlerte = fs.readFileSync('alerte_ia.txt', 'utf8');
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 [IA AUTOCORRECTION] Échec de parsing sur les données Amazon',
            body: contenuAlerte,
            labels: ['auto-correction']
          });
